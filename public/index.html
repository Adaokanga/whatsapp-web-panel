<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web Panel - Monitor de Grupos</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .header h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
        }
        
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .status-connected { background: #10b981; color: white; }
        .status-disconnected { background: #ef4444; color: white; }
        .status-connecting { background: #f59e0b; color: white; }
        
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .stat-value { font-size: 32px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 14px; color: #9ca3af; margin-top: 5px; }
        
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .panel {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .panel h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 20px;
            border-bottom: 2px solid rgba(102,126,234,0.3);
            padding-bottom: 10px;
        }
        
        .qr-container { text-align: center; padding: 20px; }
        
        .qr-container img {
            max-width: 300px;
            border: 3px solid #667eea;
            border-radius: 10px;
            background: white;
            padding: 10px;
        }
        
        .groups-list { max-height: 500px; overflow-y: auto; }
        
        .group-item {
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        
        .group-item:hover {
            background: rgba(102,126,234,0.2);
            transform: translateX(5px);
        }
        
        .group-item.active {
            background: rgba(102,126,234,0.3);
            border-color: #667eea;
        }
        
        .group-name { font-weight: bold; color: #e0e0e0; }
        .group-id { font-size: 11px; color: #667eea; font-family: monospace; margin-top: 3px; }
        .group-participants { font-size: 12px; color: #9ca3af; margin-top: 3px; }
        
        .messages-container { max-height: 600px; overflow-y: auto; }
        
        .message-item {
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .message-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .message-sender { font-weight: bold; color: #667eea; }
        .message-time { font-size: 11px; color: #6b7280; }
        .message-group { font-size: 11px; color: #9ca3af; font-style: italic; }
        .message-content { color: #d1d5db; word-break: break-word; }
        
        .button-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }
        
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        
        .search-input {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            margin-bottom: 15px;
        }
        
        .search-input:focus { outline: none; border-color: #667eea; }
        .search-input::placeholder { color: #9ca3af; }
        
        .empty-state { text-align: center; padding: 40px; color: #6b7280; }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102,126,234,0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 WhatsApp Web Panel</h1>
            <div>
                <span id="statusBadge" class="status-badge status-disconnected">🔴 Desconectado</span>
            </div>
        </div>

        <div class="stats" id="statsContainer" style="display: none;">
            <div class="stat-card">
                <div class="stat-value" id="groupsCount">0</div>
                <div class="stat-label">Grupos</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="messagesCount">0</div>
                <div class="stat-label">Mensagens</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="uptime">00:00</div>
                <div class="stat-label">Tempo Online</div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <h2>🔐 Conexão WhatsApp</h2>
                <div id="qrContainer" class="qr-container">
                    <div class="empty-state">
                        <div class="loading-spinner"></div>
                        <p style="margin-top: 20px;">Aguardando QR Code...</p>
                        <p style="font-size: 12px; color: #6b7280;">Pode levar até 30 segundos</p>
                    </div>
                </div>
                <div id="groupsContainer" style="display: none;">
                    <input type="text" class="search-input" id="groupSearch" placeholder="🔍 Buscar grupo por nome...">
                    <div class="groups-list" id="groupsList"></div>
                    <div class="button-group">
                        <button class="btn btn-primary" onclick="downloadJSON()">💾 JSON</button>
                        <button class="btn btn-info" onclick="downloadTXT()">📝 TXT</button>
                        <button class="btn btn-success" onclick="downloadAll()">📦 ZIP</button>
                        <button class="btn btn-warning" onclick="copyAllIDs()">📋 Copiar</button>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h2>💬 Mensagens em Tempo Real</h2>
                <div class="messages-container" id="messagesContainer">
                    <div class="empty-state">
                        <p>📭 Aguardando mensagens...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io({
            reconnection: true,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            reconnectionAttempts: Infinity
        });
        
        let groups = [];
        let selectedGroup = null;
        let startTime = null;

        socket.on('connect', () => {
            console.log('Conectado ao servidor');
            socket.emit('get-status');
        });

        socket.on('connect_error', (error) => {
            console.log('Erro de conexão:', error);
            setTimeout(() => socket.connect(), 5000);
        });

        socket.on('qr-code', (qrImage) => {
            const qrContainer = document.getElementById('qrContainer');
            
            if (qrImage) {
                qrContainer.innerHTML = `
                    <img src="${qrImage}" alt="QR Code" onload="this.style.display='block'" onerror="this.parentElement.innerHTML='<p style=color:red>Erro ao carregar QR</p>'">
                    <p style="margin-top: 15px; color: #10b981; font-weight: bold;">
                        📱 Escaneie com WhatsApp
                    </p>
                    <p style="font-size: 12px; color: #6b7280; margin-top: 10px;">
                        Abra WhatsApp → Configurações → WhatsApp Web → Escanear QR Code
                    </p>
                `;
                updateStatus('connecting');
                
                // Mostrar stats mesmo durante QR
                document.getElementById('statsContainer').style.display = 'grid';
                document.getElementById('groupsContainer').style.display = 'none';
            } else {
                qrContainer.innerHTML = `
                    <div class="empty-state">
                        <p style="color: #10b981; font-size: 18px;">✅ Conectado!</p>
                        <p style="color: #6b7280;">Carregando grupos...</p>
                    </div>
                `;
            }
        });

        socket.on('connection-status', (status) => {
            if (status.connected) {
                updateStatus('connected');
                startTime = new Date();
                updateUptime();
                document.getElementById('qrContainer').style.display = 'none';
                document.getElementById('groupsContainer').style.display = 'block';
                document.getElementById('statsContainer').style.display = 'grid';
            } else if (status.reason === 'reconnecting') {
                updateStatus('connecting');
                document.getElementById('qrContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="loading-spinner"></div>
                        <p style="margin-top: 20px;">Reconectando... (Tentativa ${status.attempt || 1})</p>
                    </div>
                `;
            } else {
                updateStatus('disconnected');
            }
        });

        socket.on('groups-update', (updatedGroups) => {
            groups = updatedGroups || [];
            document.getElementById('groupsCount').textContent = groups.length;
            renderGroups(groups);
            
            if (groups.length > 0) {
                document.getElementById('qrContainer').style.display = 'none';
                document.getElementById('groupsContainer').style.display = 'block';
                document.getElementById('statsContainer').style.display = 'grid';
            }
        });

        socket.on('new-message', (message) => {
            addMessageToUI(message);
        });

        socket.on('message-count', (count) => {
            document.getElementById('messagesCount').textContent = count;
        });

        function updateStatus(status) {
            const badge = document.getElementById('statusBadge');
            switch(status) {
                case 'connected':
                    badge.className = 'status-badge status-connected';
                    badge.innerHTML = '🟢 Conectado';
                    break;
                case 'disconnected':
                    badge.className = 'status-badge status-disconnected';
                    badge.innerHTML = '🔴 Desconectado';
                    break;
                case 'connecting':
                    badge.className = 'status-badge status-connecting';
                    badge.innerHTML = '🟡 Conectando...';
                    break;
            }
        }

        function renderGroups(groupList) {
            const container = document.getElementById('groupsList');
            if (!groupList || groupList.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>Nenhum grupo encontrado</p></div>';
                return;
            }
            
            container.innerHTML = groupList.map(group => `
                <div class="group-item ${selectedGroup === group.id ? 'active' : ''}" 
                     onclick="selectGroup('${group.id}')">
                    <div class="group-name">📌 ${group.name}</div>
                    <div class="group-id">🆔 ${group.id}</div>
                    <div class="group-participants">👥 ${group.participants} participantes</div>
                </div>
            `).join('');
        }

        function selectGroup(groupId) {
            selectedGroup = groupId;
            renderGroups(groups);
        }

        function addMessageToUI(message) {
            if (selectedGroup && message.groupId !== selectedGroup) return;
            
            const container = document.getElementById('messagesContainer');
            
            if (container.querySelector('.empty-state')) {
                container.innerHTML = '';
            }
            
            const messageElement = document.createElement('div');
            messageElement.className = 'message-item';
            
            const time = new Date(message.timestamp).toLocaleTimeString('pt-BR');
            
            messageElement.innerHTML = `
                <div class="message-header">
                    <span class="message-sender">👤 ${message.fromName}</span>
                    <span class="message-time">${time}</span>
                </div>
                <div class="message-group">📌 ${message.groupName}</div>
                <div class="message-content">${message.content}</div>
            `;
            
            container.insertBefore(messageElement, container.firstChild);
            
            while (container.children.length > 100) {
                container.removeChild(container.lastChild);
            }
        }

        document.getElementById('groupSearch')?.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = groups.filter(g => 
                g.name.toLowerCase().includes(term) ||
                g.id.toLowerCase().includes(term)
            );
            renderGroups(filtered);
        });

        function updateUptime() {
            setInterval(() => {
                if (!startTime) return;
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const h = Math.floor(diff / 3600);
                const m = Math.floor((diff % 3600) / 60);
                const s = diff % 60;
                document.getElementById('uptime').textContent = 
                    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        function downloadJSON() { window.open('/api/download/groups-json', '_blank'); }
        function downloadTXT() { window.open('/api/download/groups-txt', '_blank'); }
        function downloadAll() { window.open('/api/download/all', '_blank'); }
        
        function copyAllIDs() {
            const ids = groups.map(g => `${g.name} = ${g.id}`).join('\n');
            navigator.clipboard.writeText(ids).then(() => {
                alert('✅ IDs copiados!');
            }).catch(() => {
                alert('❌ Erro ao copiar');
            });
        }

        // Recarregar página se desconectar por muito tempo
        let disconnectTimer;
        socket.on('disconnect', () => {
            disconnectTimer = setTimeout(() => {
                location.reload();
            }, 30000);
        });
        
        socket.on('connect', () => {
            if (disconnectTimer) clearTimeout(disconnectTimer);
        });
    </script>
</body>
</html>
