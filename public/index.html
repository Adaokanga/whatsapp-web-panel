<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web Panel</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;min-height:100vh;color:#e0e0e0}
        .container{max-width:1200px;margin:0 auto;padding:15px}
        .header{background:#16213e;border-radius:12px;padding:15px 20px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .header h1{color:#e94560;font-size:22px}
        .status{padding:8px 16px;border-radius:20px;font-weight:bold;font-size:13px}
        .connected{background:#00c853;color:#fff}
        .waiting{background:#ff9100;color:#fff;animation:pulse 1.5s infinite}
        .disconnected{background:#ff1744;color:#fff}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
        .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:15px}
        .stat{background:#16213e;padding:18px;border-radius:10px;text-align:center}
        .stat-val{font-size:28px;font-weight:bold;color:#e94560}
        .stat-label{font-size:11px;color:#999;margin-top:3px}
        .main{display:grid;grid-template-columns:1fr 1fr;gap:15px}
        .panel{background:#16213e;border-radius:12px;padding:18px}
        .panel h2{color:#e94560;margin-bottom:12px;font-size:18px;border-bottom:2px solid rgba(233,69,96,.2);padding-bottom:8px}
        .qr-box{text-align:center;padding:15px;min-height:250px;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .qr-box img{max-width:240px;border:3px solid #e94560;border-radius:10px;background:#fff;padding:8px}
        .groups-list{max-height:350px;overflow-y:auto}
        .group-item{padding:12px;margin:5px 0;background:#0f3460;border-radius:8px;cursor:pointer;transition:.2s;border:2px solid transparent}
        .group-item:hover{background:#1a4a7a}
        .group-item.selected{border-color:#e94560;background:#1a3360}
        .group-name{font-weight:bold;color:#fff;font-size:14px}
        .group-id{font-size:11px;color:#e94560;font-family:monospace;margin-top:3px}
        .group-info{font-size:11px;color:#999;margin-top:2px}
        .msgs-box{max-height:450px;overflow-y:auto}
        .msg{padding:12px;margin:5px 0;background:#0f3460;border-radius:8px;animation:slide .3s}
        @keyframes slide{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
        .msg-sender{font-weight:bold;color:#e94560;font-size:13px}
        .msg-time{font-size:10px;color:#666}
        .msg-group{font-size:10px;color:#999;margin:3px 0}
        .msg-text{color:#ddd;font-size:13px;margin-top:3px;word-break:break-word}
        .btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
        .btn{padding:10px 16px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;color:#fff;font-size:12px;transition:.2s}
        .btn:hover{opacity:.85;transform:translateY(-1px)}
        .btn-json{background:#e94560}
        .btn-txt{background:#533483}
        .btn-zip{background:#00c853}
        .btn-copy{background:#ff9100}
        .btn-load{background:#2196f3}
        .search-input{width:100%;padding:10px;background:#0f3460;border:1px solid #333;border-radius:8px;color:#fff;margin-bottom:10px;font-size:13px}
        .search-input:focus{outline:none;border-color:#e94560}
        .empty-state{text-align:center;padding:30px;color:#666}
        .spinner{width:35px;height:35px;border:3px solid #333;border-top-color:#e94560;border-radius:50%;animation:spin 1s linear infinite;margin:15px auto}
        @keyframes spin{to{transform:rotate(360deg)}}
        .alert{background:#e94560;color:#fff;padding:12px;border-radius:8px;margin:10px 0;text-align:center;font-size:13px}
        @media(max-width:768px){.main{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 WhatsApp Web Panel</h1>
            <span id="statusBadge" class="status disconnected">🔴 Desconectado</span>
        </div>

        <div class="stats" id="statsBox">
            <div class="stat">
                <div class="stat-val" id="groupCount">0</div>
                <div class="stat-label">Grupos Carregados</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="msgCount">0</div>
                <div class="stat-label">Mensagens</div>
            </div>
        </div>

        <div class="main">
            <!-- PAINEL ESQUERDO: QR + GRUPOS + DOWNLOADS -->
            <div class="panel">
                <h2>🔐 Conexão & Grupos</h2>
                
                <!-- Área do QR Code -->
                <div id="qrArea" class="qr-box">
                    <div class="spinner"></div>
                    <p style="margin-top:10px">Aguardando QR Code...</p>
                </div>

                <!-- Área dos Grupos (escondida até conectar) -->
                <div id="groupsArea" style="display:none">
                    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Buscar grupo por nome..." oninput="filterGroups()">
                    
                    <div class="groups-list" id="groupsList">
                        <div class="empty-state">Carregando grupos...</div>
                    </div>

                    <!-- BOTÕES DE DOWNLOAD - VISÍVEIS SEMPRE -->
                    <div style="background:#0f3460;border-radius:10px;padding:15px;margin-top:15px">
                        <p style="font-weight:bold;color:#e94560;margin-bottom:10px">📥 DOWNLOAD DOS GRUPOS</p>
                        <div class="btn-row">
                            <button class="btn btn-json" onclick="downloadJSON()">💾 Baixar JSON</button>
                            <button class="btn btn-txt" onclick="downloadTXT()">📝 Baixar TXT</button>
                            <button class="btn btn-zip" onclick="downloadZIP()">📦 Baixar ZIP</button>
                            <button class="btn btn-copy" onclick="copyIDs()">📋 Copiar IDs</button>
                            <button class="btn btn-load" onclick="loadGroups()">🔄 Recarregar Grupos</button>
                        </div>
                        <p style="font-size:10px;color:#999;margin-top:8px">* Os downloads só funcionam após os grupos carregarem</p>
                    </div>
                </div>
            </div>

            <!-- PAINEL DIREITO: MENSAGENS -->
            <div class="panel">
                <h2>💬 Mensagens em Tempo Real</h2>
                <div class="msgs-box" id="msgsBox">
                    <div class="empty-state">📭 Aguardando mensagens...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var groups = [];
        var selGroup = null;
        var socket = io({transports:['websocket','polling'],reconnection:true});

        // ========== BUSCAR QR CODE ==========
        function checkQR() {
            fetch('/api/qrcode').then(r=>r.json()).then(d=>{
                if(d.success && d.qrCode) showQR(d.qrCode);
                else if(d.connected) connectedUI();
            }).catch(()=>{});
        }

        function showQR(data) {
            document.getElementById('qrArea').innerHTML = `
                <img src="${data}" alt="QR Code">
                <p style="margin-top:10px;color:#00c853;font-weight:bold">📱 Escaneie com WhatsApp</p>
                <p style="font-size:11px;color:#999">WhatsApp → Aparelhos conectados → Escanear</p>
                <button class="btn btn-load" onclick="location.reload()" style="margin-top:10px">🔄 Atualizar</button>
            `;
            document.getElementById('statusBadge').className = 'status waiting';
            document.getElementById('statusBadge').innerHTML = '🟡 Aguardando scan...';
        }

        function connectedUI() {
            document.getElementById('statusBadge').className = 'status connected';
            document.getElementById('statusBadge').innerHTML = '🟢 Conectado';
            document.getElementById('qrArea').style.display = 'none';
            document.getElementById('groupsArea').style.display = 'block';
        }

        // ========== SOCKET EVENTS ==========
        socket.on('connect',()=>{socket.emit('get-qr');});

        socket.on('qr-code',qr=>{if(qr)showQR(qr);});

        socket.on('connection-status',s=>{
            if(s.connected) connectedUI();
        });

        socket.on('groups-update',g=>{
            groups = g || [];
            document.getElementById('groupCount').textContent = groups.length;
            renderGroups(groups);
            if(groups.length > 0) {
                document.getElementById('qrArea').style.display = 'none';
                document.getElementById('groupsArea').style.display = 'block';
            }
        });

        socket.on('new-message',m=>{
            if(selGroup && m.groupId !== selGroup) return;
            var box = document.getElementById('msgsBox');
            if(box.querySelector('.empty-state')) box.innerHTML = '';
            var el = document.createElement('div');
            el.className = 'msg';
            el.innerHTML = `<div style="display:flex;justify-content:space-between"><span class="msg-sender">👤 ${m.fromName}</span><span class="msg-time">${new Date(m.timestamp).toLocaleTimeString('pt-BR')}</span></div><div class="msg-group">📌 ${m.groupName}</div><div class="msg-text">${m.content}</div>`;
            box.insertBefore(el,box.firstChild);
            while(box.children.length>100) box.removeChild(box.lastChild);
        });

        socket.on('message-count',c=>{document.getElementById('msgCount').textContent=c;});

        // ========== RENDERIZAR GRUPOS ==========
        function renderGroups(list) {
            var c = document.getElementById('groupsList');
            if(!list||list.length===0){c.innerHTML='<div class="empty-state">Nenhum grupo encontrado. Clique em "Recarregar Grupos"</div>';return}
            c.innerHTML = list.map(g=>`
                <div class="group-item${selGroup===g.id?' selected':''}" onclick="selectGroup('${g.id}')">
                    <div class="group-name">📌 ${g.name}</div>
                    <div class="group-id">🆔 ${g.id}</div>
                    <div class="group-info">👥 ${g.participants} participantes</div>
                </div>
            `).join('');
        }

        function selectGroup(id){selGroup=selGroup===id?null:id;renderGroups(groups)}
        function filterGroups(){
            var t=document.getElementById('searchInput').value.toLowerCase();
            renderGroups(groups.filter(g=>g.name.toLowerCase().includes(t)||g.id.includes(t)));
        }

        // ========== DOWNLOADS ==========
        function downloadJSON(){
            if(groups.length===0){alert('⚠️ Nenhum grupo carregado! Clique em "Recarregar Grupos" primeiro.');return}
            window.open('/api/download/groups-json','_blank');
        }
        function downloadTXT(){
            if(groups.length===0){alert('⚠️ Nenhum grupo carregado!');return}
            window.open('/api/download/groups-txt','_blank');
        }
        function downloadZIP(){
            if(groups.length===0){alert('⚠️ Nenhum grupo carregado!');return}
            window.open('/api/download/all','_blank');
        }
        function copyIDs(){
            if(groups.length===0){alert('⚠️ Nenhum grupo carregado!');return}
            navigator.clipboard.writeText(groups.map(g=>g.name+' = '+g.id).join('\n')).then(()=>alert('✅ '+groups.length+' IDs copiados!'));
        }
        function loadGroups(){
            document.getElementById('groupsList').innerHTML='<div class="empty-state"><div class="spinner"></div><p>Carregando grupos...</p></div>';
            socket.emit('load-groups');
            fetch('/api/load-groups').then(r=>r.json()).then(d=>{
                if(d.success){groups=d.groups;renderGroups(groups);document.getElementById('groupCount').textContent=groups.length}
                else alert('❌ Erro ao carregar grupos');
            });
        }

        // ========== INICIAR ==========
        setInterval(checkQR,3000);
        checkQR();
        loadGroups();
    </script>
</body>
</html>
